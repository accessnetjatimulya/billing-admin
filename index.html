<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - ACCESSNET</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{ margin:0; background:#f4f7f6; font-family:Arial,sans-serif; }
    .mobile-topbar { display: none; background: #2c3e50; padding: 10px 15px; color: #fff; position: fixed; top: 0; left: 0; right: 0; z-index: 1001; }
    .sidebar{ position:fixed; top:0; left:0; width:250px; height:100vh; background:#2c3e50; padding:20px; overflow-y:auto; z-index:1000; transition: transform 0.3s ease; }
    .sidebar h4{ color:#fff; }
    .btn-sidebar{ display: block; width:100%; text-align:left; color:#bdc3c7; margin-bottom:8px; border:none; text-decoration: none; padding: 10px; border-radius: 5px; }
    .btn-sidebar:hover, .btn-sidebar.active{ background:#0d6efd !important; color:#fff !important; font-weight:bold; }
    .main-content{ margin-left:250px; padding:20px; transition: margin 0.3s ease; }
    .card{ border:none; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
    @media(max-width:991.98px){
      .mobile-topbar { display: flex; justify-content: space-between; align-items: center; }
      .sidebar{ transform: translateX(-100%); top: 56px; height: calc(100vh - 56px); width: 280px; }
      .sidebar.show { transform: translateX(0); }
      .main-content{ margin-left:0; padding-top: 76px; }
    }
  </style>
</head>
<body>

<div class="main-content">
  <div class="container-fluid px-0">
    <div class="card p-3 p-md-5 text-center">
      <h1 class="fs-2 fs-md-1">Selamat Datang di Portal Accessnet</h1>
      <p class="lead fs-6 fs-md-4">Sistem Manajemen Pelanggan dan Invoice</p>

      <div class="row mt-4">
        <div class="col-sm-6 col-md-4 mb-3">
          <a href="pelanggan.html" class="card bg-primary text-white p-4 h-100 d-flex align-items-center justify-content-center text-decoration-none">
            <h4 class="mb-0 text-center fs-5 fs-md-4">Kelola Pelanggan</h4>
          </a>
        </div>
        <div class="col-sm-6 col-md-4 mb-3">
          <a href="invoice-tagihan.html" class="card bg-success text-white p-4 h-100 d-flex align-items-center justify-content-center text-decoration-none">
            <h4 class="mb-0 text-center fs-5 fs-md-4">Invoice Tagihan</h4>
          </a>
        </div>
        <div class="col-sm-12 col-md-4 mb-3">
          <a href="data-invoice.html" class="card bg-dark text-white p-4 h-100 d-flex align-items-center justify-content-center text-decoration-none">
            <h4 class="mb-0 text-center fs-5 fs-md-4">Data Invoice</h4>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="global.js"></script>
<script>
  renderNavigation('dashboard');
</script>
</body>
</html>
