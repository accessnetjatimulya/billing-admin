<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Data Pelanggan - ACCESSNET</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
  <style>
    body{ margin:0; background:#f4f7f6; font-family:Arial,sans-serif; }
    .mobile-topbar { display: none; background: #2c3e50; padding: 10px 15px; color: #fff; position: fixed; top: 0; left: 0; right: 0; z-index: 1001; }
    .sidebar{ position:fixed; top:0; left:0; width:250px; height:100vh; background:#2c3e50; padding:20px; overflow-y:auto; z-index:1000; transition: transform 0.3s ease; }
    .sidebar h4{ color:#fff; }
    .btn-sidebar{ display: block; width:100%; text-align:left; color:#bdc3c7; margin-bottom:8px; border:none; text-decoration: none; padding: 10px; border-radius: 5px; }
    .btn-sidebar:hover, .btn-sidebar.active{ background:#0d6efd !important; color:#fff !important; font-weight:bold; }
    .main-content{ margin-left:250px; padding:20px; transition: margin 0.3s ease; }
    .card{ border:none; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
    textarea.form-control{ min-height:45px !important; border-radius:14px !important; resize:none; }
    @media(max-width:991.98px){
      .mobile-topbar { display: flex; justify-content: space-between; align-items: center; }
      .sidebar{ transform: translateX(-100%); top: 56px; height: calc(100vh - 56px); width: 280px; }
      .sidebar.show { transform: translateX(0); }
      .main-content{ margin-left:0; padding-top: 76px; }
    }
  </style>
</head>
<body>

<div class="main-content">
  <div class="card p-3 p-md-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h3 class="mb-0 fs-4 fs-md-3">Data Pelanggan</h3>
      <div class="d-flex flex-wrap gap-2 w-100 w-sm-auto justify-content-md-end">
        <button class="btn btn-primary btn-sm" onclick="filterByType('PPP')" style="border-radius:10px; font-weight:bold;">PPP : <span id="totalPPP">0</span></button>
        <button class="btn btn-danger btn-sm" onclick="filterByType('HOTSPOT')" style="border-radius:10px; font-weight:bold;">HOTSPOT : <span id="totalHOTSPOT">0</span></button>
        <button class="btn btn-secondary btn-sm" onclick="filterByPaket('BATAS')" style="border-radius:10px; font-weight:bold;">BATAS : <span id="totalBATAS">0</span></button>
        <button class="btn btn-success btn-sm" onclick="filterByStatus('AKTIF')" style="border-radius:10px; font-weight:bold;">AKTIF : <span id="totalAktif">0</span></button>
        <button class="btn btn-dark btn-sm" onclick="filterByStatus('EXPIRED')" style="border-radius:10px; font-weight:bold;">EXPIRED : <span id="totalExpired">0</span></button>
        <button class="btn btn-info btn-sm text-white" onclick="resetFilter()" style="border-radius:10px; font-weight:bold;">ALL : <span id="totalALL">0</span></button>
        <button class="btn btn-success btn-sm" onclick="openModal()" style="border-radius:10px; font-weight:bold;">+ Tambah Pelanggan</button>
      </div>
    </div>

    <input type="text" id="searchPelanggan" class="form-control mb-3" placeholder="Cari Nama / ID" onkeyup="filterPelanggan()">

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Nama</th>
            <th>Alamat</th>
            <th>Paket</th>
            <th>Expired At</th>
            <th>Updated At</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelPelangganBody">
          <tr><td colspan="8" class="text-center">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="modalPelanggan" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

            <div class="col-md-6 mb-2">

                  <option value="852">Hong Kong (+852)</option>

                  <option value="886">Taiwan (+886)</option>

            </div>
            <div class="col-md-4 mb-2">
              <label class="form-label">Tipe Langganan</label>
              <select id="f_tipe" class="form-select" onchange="loadPaketByTipe()">
                <option value="PPP">PPP</option>

            <div class="col-md-6 mb-2">

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
<script src="global.js"></script>
<script>
if(checkLogin()){
  renderNavigation('pelanggan');
}
</script>

<script>
  let allPelanggan = [];
  let editMode = false;
  let currentEditId = '';

  window.onload = function(){
    window.negaraSelect = new TomSelect("#kode_negara_select",{ create:false, placeholder:"Cari negara..." });
    loadDataPelanggan();
  };

  function loadDataPelanggan(){
    callAPI('getPelangganData', null, function(data){
      allPelanggan = data;
      renderTable(data);
      updateTotalPelanggan(data);
    });
  }

  function renderTable(data){
    const tbody = document.getElementById('tabelPelangganBody');
    tbody.innerHTML = '';
    if(data.length == 0){
      tbody.innerHTML = '<tr><td colspan="8" class="text-center">Data kosong</td></tr>';
      return;
    }
    data.forEach(function(p){
      const expired = p.EXPIRED_AT || '-';
      const updated = p.UPDATED_AT || '-';
      let status = '<span class="badge bg-secondary">-</span>';

      if(p.EXPIRED_AT){
        try {
          const now = new Date();
          const todayNumber = Number(now.getFullYear().toString() + String(now.getMonth() + 1).padStart(2,'0') + String(now.getDate()).padStart(2,'0'));
          const tanggal = String(p.EXPIRED_AT).split(' ')[0];
          const parts = tanggal.split('/');
          const expiredNumber = Number(parts[2] + parts[1].padStart(2,'0') + parts[0].padStart(2,'0'));
          status = (expiredNumber < todayNumber) ? '<span class="badge bg-danger">EXPIRED</span>' : '<span class="badge bg-success">AKTIF</span>';
        } catch(e){}
      }

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${p.ID}</td>
        <td>${p.NAMA}</td>
        <td>${p.ALAMAT}</td>
        <td>${p.PAKET} (Rp ${Number(String(p.HARGA_PAKET).replace(/[^0-9]/g,'')).toLocaleString("id-ID")})</td>
        <td>${expired}</td>
        <td>${updated}</td>
        <td>${status}</td>
        <td>
          <div class="d-flex gap-1">
            <button class="btn btn-warning btn-sm" onclick="editPelanggan('${p.ID}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="hapusPelanggan('${p.ID}')">Hapus</button>
          </div>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  function updateTotalPelanggan(data){
    let totalPPP = 0, totalHOTSPOT = 0, totalBATAS = 0, totalAktif = 0, totalExpired = 0;
    data.forEach(p => {
      if(String(p.TIPE_LANGGANAN).toUpperCase() == 'PPP') totalPPP++;
      if(String(p.TIPE_LANGGANAN).toUpperCase() == 'HOTSPOT') totalHOTSPOT++;
      if(String(p.PAKET).toUpperCase().includes('BATAS')) totalBATAS++;
      if(p.EXPIRED_AT){
        const parts = String(p.EXPIRED_AT).split(' ')[0].split('/');
        if(parts.length === 3){
          const exp = new Date(parts[2], parts[1]-1, parts[0]);
          const today = new Date(); today.setHours(0,0,0,0);
          if(exp < today) totalExpired++; else totalAktif++;
        }
      }
    });
    document.getElementById('totalPPP').innerText = totalPPP;
    document.getElementById('totalHOTSPOT').innerText = totalHOTSPOT;
    document.getElementById('totalBATAS').innerText = totalBATAS;
    document.getElementById('totalAktif').innerText = totalAktif;
    document.getElementById('totalExpired').innerText = totalExpired;
    document.getElementById('totalALL').innerText = data.length;
  }

  function filterPelanggan(){
    const val = document.getElementById('searchPelanggan').value.toLowerCase();
    renderTable(allPelanggan.filter(p => p.NAMA.toLowerCase().includes(val) || p.ID.toString().includes(val)));
  }
  function filterByPaket(paket){ renderTable(allPelanggan.filter(p => String(p.PAKET).toUpperCase().includes(paket))); }
  function filterByType(type){ renderTable(allPelanggan.filter(p => String(p.TIPE_LANGGANAN).toUpperCase() == type)); }
  function resetFilter(){ renderTable(allPelanggan); }
  function filterByStatus(status){
    renderTable(allPelanggan.filter(p => {
      if(!p.EXPIRED_AT) return false;
      const parts = String(p.EXPIRED_AT).split(' ')[0].split('/');
      const exp = new Date(parts[2], parts[1]-1, parts[0]);
      const today = new Date(); today.setHours(0,0,0,0);
      return status == 'AKTIF' ? exp >= today : exp < today;
    }));
  }

  function openModal(){
    editMode = false; currentEditId = '';
    document.getElementById('modalTitle').innerText = 'Tambah Pelanggan';
    document.getElementById('formPelanggan').reset();
    loadPaketByTipe();
    new bootstrap.Modal(document.getElementById('modalPelanggan')).show();
  }

  // FUNGSI LOAD PAKET INTERNET TERBARU YANG LENGKAP
  function loadPaketByTipe(){
    const tipe = document.getElementById('f_tipe').value;
    const select = document.getElementById('f_paket');
    
    if(tipe == 'PPP'){
      select.innerHTML = `
        <option value="">-- Pilih Paket --</option>
        <option value="ACCESSNet" data-harga="0">ACCESSNet</option>
        <option value="BATAS" data-harga="0">BATAS</option>
		 <option value="200Mb" data-harga="2000000">200Mb</option>
        <option value="200Mb" data-harga="1100000">100Mb</option>
        <option value="PP-50M" data-harga="650000">PP-50M</option>
        <option value="PP-30M" data-harga="330000">PP-30M</option>
        <option value="PP-20M" data-harga="300000">PP-20M-L</option>
		<option value="PP-20M" data-harga="250000">PP-20M</option>
        <option value="PP-15M" data-harga="185000">PP-15M</option>
        <option value="PP-12M" data-harga="165000">PP-12M</option>
        <option value="PP-8M" data-harga="145000">PP-8M</option>
        <option value="PP-7M" data-harga="130000">PP-7M</option>
        <option value="PP-5M" data-harga="110000">PP-5M</option>
        <option value="PP-STB" data-harga="185000">PP-STB</option>
        <option value="PP-1Hp" data-harga="50000">PP-1Hp</option>
        <option value="PP-2Hp" data-harga="80000">PP-2Hp</option>
      `;
    }
    else if(tipe == 'HOTSPOT'){
      select.innerHTML = `
        <option value="">-- Pilih Paket --</option>
        <option value="Hs-1hp" data-harga="50000">Hs-1hp</option>
        <option value="Hs-2hp" data-harga="80000">Hs-2hp</option>
        <option value="Keluarga" data-harga="0">Keluarga</option>
      `;
    }
  }

  function pilihPaket(){
    const s = document.getElementById('f_paket');
    const h = s.options[s.selectedIndex].getAttribute('data-harga');
    document.getElementById('f_harga').value = h ? 'Rp ' + parseInt(h).toLocaleString('id-ID') : '';
  }

  function cekIdPelanggan(){
    const input = document.getElementById('f_id');
    const err = document.getElementById('idError');
    const duplicate = allPelanggan.some(p => (!editMode || p.ID != currentEditId) && p.ID.toString().toLowerCase() == input.value.trim().toLowerCase());
    input.classList.toggle('is-invalid', duplicate);
    err.style.display = duplicate ? 'block' : 'none';
    return duplicate;
  }

  function simpanData(){
    if(cekIdPelanggan()) return;
    const formData = {
      ID: document.getElementById('f_id').value,
      NAMA: document.getElementById('f_nama').value,
      ALAMAT: document.getElementById('f_alamat').value,
      TIPE_LANGGANAN: document.getElementById('f_tipe').value,
      NO_HP: document.getElementById('f_kode_negara').value + document.getElementById('f_hp').value,
      PAKET: document.getElementById('f_paket').value,
      HARGA_PAKET: document.getElementById('f_harga').value,
      EXPIRED_AT: document.getElementById('f_expired').value,
      UPDATED_AT: document.getElementById('f_updated').value
    };
    callAPI('savePelanggan', formData, function(res){
      alert(res);
      bootstrap.Modal.getInstance(document.getElementById('modalPelanggan')).hide();
      loadDataPelanggan();
    });
  }

  function editPelanggan(id){
    editMode = true; currentEditId = id;
    const p = allPelanggan.find(x => x.ID == id);
    if(!p) return;
    document.getElementById('modalTitle').innerText = 'Edit Pelanggan';
    new bootstrap.Modal(document.getElementById('modalPelanggan')).show();
    document.getElementById('f_id').value = p.ID;
    document.getElementById('f_nama').value = p.NAMA;
    document.getElementById('f_alamat').value = p.ALAMAT;
    document.getElementById('f_tipe').value = p.TIPE_LANGGANAN || 'PPP';
    loadPaketByTipe();
    document.getElementById('f_paket').value = p.PAKET;
    pilihPaket();
    document.getElementById('f_hp').value = p.NO_HP.toString().substring(2);
  }

  function hapusPelanggan(id){
    if(confirm('Hapus pelanggan?')) callAPI('deletePelanggan', id, () => loadDataPelanggan());
  }

  function pilihKodeNegara(){ document.getElementById('f_kode_negara').value = document.getElementById('kode_negara_select').value; }
  function formatNomor(el){ el.value = el.value.replace(/\D/g,'').replace(/^0+/,''); }
  function hanyaAngka(e){ return e.charCode >= 48 && e.charCode <= 57; }
</script>

</body>
</html>
