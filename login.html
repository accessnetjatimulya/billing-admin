<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login ACCESSNET</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f4f7f6;
  font-family:Arial,sans-serif;
}

.card-login{
  width:100%;
  max-width:380px;
  border:none;
  border-radius:16px;
  box-shadow:0 4px 15px rgba(0,0,0,0.15);
}
</style>
</head>
<body>

<div class="card card-login p-4">

  <h3 class="text-center fw-bold mb-4">
    ACCESSNET LOGIN
  </h3>

  <div class="mb-3">
    <label class="form-label fw-bold">Username</label>
    <input type="text" id="username" class="form-control">
  </div>

  <div class="mb-4">
    <label class="form-label fw-bold">Password</label>
    <input type="password" id="password" class="form-control">
  </div>

  <button onclick="prosesLogin()" class="btn btn-primary w-100 fw-bold">
    LOGIN
  </button>

  <div id="infoLogin" class="text-danger text-center mt-3 fw-bold"></div>

</div>

<script src="global.js"></script>

<script>
function prosesLogin(){

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if(!username || !password){
    document.getElementById('infoLogin').innerText = 'Username & Password wajib diisi';
    return;
  }

  callAPI('loginAccessnet', {
    username: username,
    password: password
  }, function(res){

    if(res && res.status === true){

      localStorage.setItem('ACCESSNET_LOGIN', 'LOGIN_OK');

      window.location.href = 'index.html';

    } else {
      document.getElementById('infoLogin').innerText = 'Username / Password salah';
    }

  }, function(err){
    document.getElementById('infoLogin').innerText = 'Gagal koneksi server';
  });
}
</script>

</body>
</html>
