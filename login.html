<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Login ACCESSNET</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f4f7f6;
  font-family:Arial,sans-serif;
  padding:20px;
}

.card-login{
  width:100%;
  max-width:420px;
  border:none;
  border-radius:18px;
  box-shadow:0 4px 15px rgba(0,0,0,0.15);
  background:#fff;
}

.logo-title{
  font-size:32px;
  font-weight:bold;
  color:#0d6efd;
  text-align:center;
  margin-bottom:8px;
}

.sub-title{
  text-align:center;
  color:#6c757d;
  margin-bottom:30px;
  font-size:15px;
}

.form-label{
  font-size:14px;
}

.form-control{
  height:50px;
  border-radius:12px;
  font-size:16px;
}

.btn-login{
  height:50px;
  border-radius:12px;
  font-size:16px;
}

#infoLogin{
  min-height:24px;
  font-size:14px;
}

@media(max-width:576px){

  body{
    padding:15px;
    align-items:flex-start;
    padding-top:40px;
  }

  .card-login{
    max-width:100%;
    border-radius:16px;
  }

  .logo-title{
    font-size:28px;
  }

  .sub-title{
    font-size:14px;
  }

  .form-control{
    height:48px;
    font-size:15px;
  }

  .btn-login{
    height:48px;
    font-size:15px;
  }

}

</style>
</head>
<body>

<div class="card card-login p-4 p-md-5">

  <div class="text-center mb-3">
	  <img 
		src="logo-accessnet.png"
		alt="ACCESSNET"
		style="
		  width:200px;
		  height:90px;
		  object-fit:contain;
		"
	  >
	</div>

  <div class="sub-title">
    Sistem Manajemen Pelanggan & Invoice
  </div>

  <div class="mb-3">
    <label class="form-label fw-bold">
      Username
    </label>

    <input 
      type="text" 
      id="username" 
      class="form-control"
      placeholder="Masukkan username"
      autocomplete="username"
    >
  </div>

  <div class="mb-4">
    <label class="form-label fw-bold">
      Password
    </label>

    <input 
      type="password" 
      id="password" 
      class="form-control"
      placeholder="Masukkan password"
      autocomplete="current-password"
      onkeypress="if(event.key==='Enter'){prosesLogin()}"
    >
  </div>

  <button onclick="prosesLogin()" class="btn btn-primary w-100 fw-bold btn-login">
    LOGIN
  </button>

  <div id="infoLogin" class="text-danger text-center mt-3 fw-bold"></div>

</div>

<script src="global.js"></script>

<script>

if(localStorage.getItem('ACCESSNET_LOGIN') === 'LOGIN_OK'){
  window.location.replace('index.html');
}

function prosesLogin(){

  const btn = document.querySelector('.btn-login');

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if(!username || !password){
    document.getElementById('infoLogin').innerText = 'Username & Password wajib diisi';
    return;
  }

  btn.disabled = true;
  btn.innerText = 'MEMPROSES...';

  callAPI('loginAccessnet', {
    username: username,
    password: password
  }, function(res){

    btn.disabled = false;
    btn.innerText = 'LOGIN';

    if(res && res.status === true){

      localStorage.setItem('ACCESSNET_LOGIN', 'LOGIN_OK');

      window.location.replace('index.html');

    } else {

      document.getElementById('infoLogin').innerText = 'Username / Password salah';

    }

  }, function(err){

    btn.disabled = false;
    btn.innerText = 'LOGIN';

    document.getElementById('infoLogin').innerText = 'Gagal koneksi server';

  });
}

</script>

</body>
</html>
